apiVersion: v1
kind: ServiceAccount
metadata:
  name: larakube-dashboard
  namespace: console
  labels:
    larakube.io/managed-by: larakube
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: larakube-dashboard-role
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/log", "pods/exec", "services", "nodes", "events"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: larakube-dashboard-binding-console
  labels:
    larakube.io/managed-by: larakube
subjects:
  - kind: ServiceAccount
    name: larakube-dashboard
    namespace: console
roleRef:
  kind: ClusterRole
  name: larakube-dashboard-role
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: larakube-dashboard
      containers:
        - name: php
          image: console:latest
          imagePullPolicy: IfNotPresent
          args: []
          ports:
            - containerPort: 8080
          env:
            - name: AUTORUN_ENABLED
              value: "true"
            - name: AUTORUN_LARAVEL_MIGRATION
              value: "true"
            - name: LARAKUBE_HOST_WORKSPACE
              value: /Users/jsluchavez/Codes/Ideas/laravel-k8s
          envFrom:
            - configMapRef:
                name: laravel-config
            - secretRef:
                name: laravel-secrets
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/logs
              subPath: logs
            - name: storage
              mountPath: /var/www/html/bootstrap/cache
              subPath: bootstrap/cache
            - name: storage
              mountPath: /var/www/html/storage/framework/sessions
              subPath: framework/sessions
            - name: storage
              mountPath: /var/www/html/storage/framework/views
              subPath: framework/views
            - name: storage
              mountPath: /var/www/html/storage/framework/cache
              subPath: framework/cache
            - name: storage
              mountPath: /var/www/html/storage/app/public
              subPath: app/public
            - name: data
              mountPath: /var/lib/larakube
            - name: larakube-config
              mountPath: /var/lib/larakube-config
            - name: larakube-workspace
              mountPath: /var/lib/larakube-workspace
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: console-laravel-storage-pvc
        - name: data
          persistentVolumeClaim:
            claimName: console-laravel-data-pvc
        - name: larakube-config
          hostPath:
            path: /Users/jsluchavez/.larakube
            type: DirectoryOrCreate
        - name: larakube-workspace
          hostPath:
            path: /Users/jsluchavez/Codes/Ideas/laravel-k8s
            type: Directory

---

apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
    - host: console.dev.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
  tls:
    - hosts:
        - console.dev.test
